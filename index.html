<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Quick Access Dashboard</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:#eef1f8;color:#2b2b3a}
  .top{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:28px 30px;box-shadow:0 4px 20px rgba(102,126,234,.3)}
  .top h1{font-size:1.6em;margin-bottom:4px}
  .top p{opacity:.92;font-size:.95em}
  .wrap{max-width:1100px;margin:0 auto;padding:25px 20px}

  /* Quick access bar */
  .qa{background:#fff;border-radius:14px;padding:22px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:25px;position:sticky;top:12px;z-index:50}
  .qa label{font-weight:700;color:#667eea;display:block;margin-bottom:8px;font-size:.9em;text-transform:uppercase;letter-spacing:.5px}
  .qa-row{display:flex;gap:12px;flex-wrap:wrap}
  select,input{padding:14px 16px;border:2px solid #e3e6f0;border-radius:10px;font-size:1em;transition:.2s}
  select:focus,input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15)}
  #permitSelect{flex:2;min-width:280px;cursor:pointer;font-weight:600;background:#fff}
  #search{flex:1;min-width:200px}

  .phasebar{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .pbtn{padding:8px 16px;border:none;border-radius:20px;cursor:pointer;font-weight:600;font-size:.85em;background:#f0f1f8;color:#555;transition:.2s}
  .pbtn:hover{transform:translateY(-2px)}
  .pbtn.active{color:#fff}
  .pbtn[data-p="all"].active{background:#667eea}
  .pbtn[data-p="1"].active{background:#FF5252}
  .pbtn[data-p="2"].active{background:#2BA9A2}
  .pbtn[data-p="3"].active{background:#FF9500}
  .pbtn[data-p="4"].active{background:#6BD4B8}
  .pbtn[data-p="5"].active{background:#7ECFB8}

  /* Detail panel */
  .detail{background:#fff;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin-bottom:25px;overflow:hidden;display:none}
  .detail.show{display:block;animation:pop .35s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .d-head{padding:24px 28px;color:#fff;display:flex;align-items:center;gap:16px}
  .d-num{background:rgba(255,255,255,.25);min-width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4em;font-weight:800}
  .d-head h2{font-size:1.5em}
  .d-body{padding:26px 28px}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
  .meta{background:#f7f8fc;border-radius:10px;padding:14px;border-left:4px solid #667eea}
  .meta .k{font-size:.75em;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .meta .v{font-weight:700;font-size:1.05em}
  .sec-title{color:#667eea;font-weight:700;margin:22px 0 12px;padding-bottom:8px;border-bottom:2px solid #eef1f8;font-size:1.05em}
  .docs{list-style:none}
  .docs li{padding:11px 14px;background:#f7f8fc;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .docs li::before{content:'';width:18px;height:18px;background:#667eea;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .docs li{position:relative}
  .docs li::after{content:'✓';position:absolute;left:17px;color:#fff;font-size:.75em;font-weight:bold}
  .formlink{display:inline-block;margin-top:18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:13px 26px;border-radius:10px;text-decoration:none;font-weight:600;transition:.3s}
  .formlink:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(102,126,234,.4)}
  .pill{display:inline-block;padding:5px 13px;border-radius:14px;font-size:.78em;font-weight:700;margin-left:8px}
  .pill.crit{background:#ffe3e3;color:#e03131}
  .pill.high{background:#fff3bf;color:#e8590c}
  .pill.low{background:#d3f9d8;color:#2f9e44}

  /* Grid of all permits */
  .grid-title{font-size:1.2em;font-weight:700;margin:8px 0 16px;color:#444}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
  .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.07);cursor:pointer;transition:.25s}
  .card:hover{transform:translateY(-6px);box-shadow:0 12px 26px rgba(0,0,0,.14)}
  .card .ch{padding:14px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:.92em}
  .card .cb{padding:14px 16px}
  .card .ca{color:#667eea;font-weight:600;font-size:.85em;margin-bottom:6px}
  .card .cm{font-size:.78em;color:#999;display:flex;justify-content:space-between}
  .cnum{background:rgba(255,255,255,.28);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9em;flex-shrink:0}
  .b1{background:linear-gradient(135deg,#FF6B6B,#FF5252)}
  .b2{background:linear-gradient(135deg,#4ECDC4,#2BA9A2)}
  .b3{background:linear-gradient(135deg,#FFB347,#FF9500)}
  .b4{background:linear-gradient(135deg,#95E1D3,#6BD4B8)}
  .b5{background:linear-gradient(135deg,#A8E6CF,#7ECFB8)}
  .empty{text-align:center;padding:40px;color:#aaa}
  footer{text-align:center;padding:30px;color:#999;font-size:.85em}
  footer a{color:#667eea}
</style>
</head>
<body>
<div class="top">
  <h1>📋 Permit Quick Access Dashboard</h1>
  <p>CHN1A GFL Data Center — pick any permit from the dropdown for instant details</p>
</div>

<div class="wrap">
  <!-- QUICK ACCESS -->
  <div class="qa">
    <label>⚡ Quick Access — Jump to any permit</label>
    <div class="qa-row">
      <select id="permitSelect">
        <option value="">— Select a permit —</option>
      </select>
      <input id="search" type="text" placeholder="🔍 or search by name / authority...">
    </div>
    <div class="phasebar">
      <button class="pbtn active" data-p="all">All (23)</button>
      <button class="pbtn" data-p="1">Development</button>
      <button class="pbtn" data-p="2">Design</button>
      <button class="pbtn" data-p="3">Construction</button>
      <button class="pbtn" data-p="4">Commissioning</button>
      <button class="pbtn" data-p="5">Operations</button>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail" id="detail"></div>

  <!-- ALL PERMITS GRID -->
  <div class="grid-title" id="gridTitle">All Permits</div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  &copy; 2026 Thailand Data Center Permit System &middot;
  <a href="https://github.com/anupambaruah2025/permit-management-system" target="_blank">GitHub Repository</a>
</footer>

<script>
const P=[
{id:1,name:"Company Registration",auth:"Department of Business Development (DBD)",phase:1,time:"30 days",cost:"~5,000 THB",risk:"low",
 desc:"Legal establishment of the Thai company entity — the foundation for all other permits.",
 docs:["Registration application form","Articles of Association","Shareholder IDs & ownership %","Proof of registered capital (1M THB min)","Board resolution","Tax ID application (PP.01)"],
 form:"https://www.dbd.go.th/th/register-business"},
{id:2,name:"BOI Promotion Certificate",auth:"Thailand Board of Investment (BOI)",phase:1,time:"120 days",cost:"0 THB (no fee)",risk:"crit",
 desc:"Investment promotion for the data center (Category 8.2.1.1 / 8.2.1.2). ERC power letter is now a mandatory prerequisite.",
 docs:["Form F PA PP 04","ERC Power Confirmation Letter (MANDATORY)","3-year financial projections","PUE modeling & CFD studies","Thailand Benefit Enhancement Plan","Feasibility study"],
 form:"https://boi-investment.boi.go.th/public/"},
{id:3,name:"Foreign Business License",auth:"Department of Business Development (DBD)",phase:1,time:"60 days",cost:"~10,000 THB",risk:"low",
 desc:"License permitting foreign investor operations in Thailand. Required only if foreign-owned.",
 docs:["FBL application (Form P.13)","Company registration certificate","Proof of THB 2M+ capital","Business plan in Thai (5-10 pages)","Foreign investor documents (apostilled)"],
 form:"https://www.dbd.go.th/th/foreign-business-license"},
{id:4,name:"Land Use & Zoning Confirmation",auth:"Dept. of Public Works / Local Authority",phase:1,time:"30 days",cost:"~2,000 THB",risk:"low",
 desc:"Verification that the land is zoned for data center use. Prerequisite for EIA & building permit.",
 docs:["Land title deed (Chanote)","Zoning certificate request form","Site plan with boundaries","Current land-use documentation","Town planning map"],
 form:"https://www.dlt.go.th/"},
{id:5,name:"Environmental Impact Assessment (EIA)",auth:"Office of Natural Resources (ONEP)",phase:1,time:"180 days",cost:"~200-500K THB",risk:"crit",
 desc:"Comprehensive environmental study & approval. The 180-day critical-path bottleneck of the whole project.",
 docs:["EIA screening & Terms of Reference","Full EIA report (80-150 pages)","Baseline environmental data","Mitigation & monitoring plans","Community consultation records"],
 form:"https://www.onep.go.th/"},
{id:6,name:"Building Construction Permit",auth:"Local Building Control Authority",phase:2,time:"60 days",cost:"~15,000 THB",risk:"crit",
 desc:"Approval to construct the building. Gates all construction-phase permits.",
 docs:["Permit application form","Architectural plans (1:100)","Structural engineering designs","MEP specifications","Fire safety plans","EIA approval letter"],
 form:"https://www.dlt.go.th/"},
{id:7,name:"Road Access / Highway Connection",auth:"Local Authority / Highway Authority",phase:2,time:"45 days",cost:"~8,000 THB",risk:"high",
 desc:"Approval for facility access from public roads.",
 docs:["Road access application","Site plan with connections","Traffic impact study","Road design plans","Engineering certification"],
 form:"https://www.dlt.go.th/"},
{id:8,name:"Grid Connection Approval",auth:"PEA / MEA",phase:2,time:"60 days",cost:"~50-100K THB",risk:"high",
 desc:"Approval for electrical grid connection and power supply.",
 docs:["Grid connection application","Single-line electrical diagram","Load calculations","Substation design","Power distribution design"],
 form:"https://www.pea.co.th/"},
{id:9,name:"Power Availability Confirmation",auth:"Energy Regulatory Commission (ERC)",phase:2,time:"30 days",cost:"0 THB",risk:"crit",
 desc:"Confirmation of grid power availability. NOW MANDATORY before the BOI application.",
 docs:["Power requirement letter","Load forecast","Project specifications","Site location map","Grid connection plans"],
 form:"https://www.erc.or.th/"},
{id:10,name:"High-Voltage Substation Approval",auth:"PEA / MEA",phase:2,time:"90 days",cost:"~100-200K THB",risk:"high",
 desc:"Design and approval of the on-site high-voltage substation.",
 docs:["Substation design plans","Electrical specifications","Safety & security plan","Environmental assessment","Land control proof"],
 form:"https://www.pea.co.th/"},
{id:11,name:"Water Supply Connection",auth:"MWA / PWA",phase:3,time:"45 days",cost:"~20-40K THB",risk:"low",
 desc:"Connection and approval for fresh water supply (essential for cooling).",
 docs:["Water connection application","Water demand calculation","Supply system drawings","Storage tank design","Site plan with routing"],
 form:"https://www.mwa.co.th/"},
{id:12,name:"Wastewater / Drainage Connection",auth:"Local Authority / Water Authority",phase:3,time:"45 days",cost:"~25-50K THB",risk:"low",
 desc:"Treatment and discharge approval for facility wastewater.",
 docs:["Wastewater discharge application","Treatment system design","Discharge quality standards","Drainage design & routing","Monitoring plan"],
 form:"https://www.mwa.co.th/"},
{id:13,name:"Fire Protection System Approval",auth:"Building Control / Fire Authority",phase:3,time:"30 days",cost:"~80-150K THB",risk:"high",
 desc:"Design approval for fire detection and suppression systems.",
 docs:["Fire safety plan","Detection system design","Suppression design (FM-200/Nitrogen)","Emergency lighting & signage","Evacuation procedures"],
 form:"https://www.dlt.go.th/"},
{id:14,name:"Generator & Fuel Storage",auth:"Department of Energy Business (DOEB)",phase:3,time:"60 days",cost:"~10-20K THB",risk:"high",
 desc:"Approval for backup generator and fuel storage facility.",
 docs:["Generator specifications","Fuel tank design","Secondary containment (110%)","Safety plan","Testing & maintenance schedule"],
 form:"https://www.doeb.go.th/"},
{id:15,name:"Telecommunications / Fiber Connection",auth:"NBTC",phase:3,time:"45 days",cost:"~5-15K THB",risk:"low",
 desc:"Approval for telecom infrastructure and fiber connections.",
 docs:["Telecom service application","Network architecture","Service area map","Technical specifications","Security plan"],
 form:"https://www.nbtc.go.th/"},
{id:16,name:"Electrical Inspection & Energization",auth:"PEA / MEA",phase:3,time:"14 days",cost:"~5,000 THB",risk:"low",
 desc:"Final inspection and approval to energize the electrical system.",
 docs:["Final as-built electrical design","Equipment certifications","Load calculation verification","Grounding & safety compliance","Verified single-line diagram"],
 form:"https://www.pea.co.th/"},
{id:17,name:"Fire Safety Inspection",auth:"Local Fire Authority",phase:4,time:"7 days",cost:"0 THB",risk:"low",
 desc:"Final inspection of all installed fire protection systems.",
 docs:["System test certificates","Emergency lighting verification","Fire extinguisher certification","Evacuation route verification","Staff training records"],
 form:"https://www.dlt.go.th/"},
{id:18,name:"Building Completion Inspection",auth:"Local Building Control Authority",phase:4,time:"7 days",cost:"~3,000 THB",risk:"low",
 desc:"Final inspection verifying building completion per approved plans.",
 docs:["As-built drawings","Structural certification","Material test certificates","MEP commissioning reports","QA documentation"],
 form:"https://www.dlt.go.th/"},
{id:19,name:"Occupancy Certificate",auth:"Local Building Control Authority",phase:4,time:"14 days",cost:"~2,000 THB",risk:"high",
 desc:"Final approval allowing facility occupancy — the gateway to operations.",
 docs:["Building completion approval","Fire safety inspection approval","Electrical inspection approval","Proof of all utility connections","Insurance certificate"],
 form:"https://www.dlt.go.th/"},
{id:20,name:"Commissioning & Utility Acceptance",auth:"Utilities & Local Authorities",phase:4,time:"21 days",cost:"~15-30K THB",risk:"low",
 desc:"Final testing and acceptance of all utility systems.",
 docs:["Electrical commissioning report","Water system testing","Wastewater treatment verification","Fire protection test","Performance certificates"],
 form:"https://www.pea.co.th/"},
{id:21,name:"Factory License",auth:"Department of Industrial Works (DIW)",phase:5,time:"30 days",cost:"~5,000 THB",risk:"low",
 desc:"License for industrial operations at the data center facility.",
 docs:["Factory license application","Building inspection certificate","Environmental assessment","Worker safety plan","Waste management plan"],
 form:"https://www.diw.go.th/"},
{id:22,name:"PDPA Compliance",auth:"Personal Data Protection Committee",phase:5,time:"30 days",cost:"0 THB",risk:"low",
 desc:"Data protection compliance for customer and operational data.",
 docs:["Data protection policy","Privacy notices","Data processing agreements","Breach response plan","Staff training records"],
 form:"https://www.pdpa.go.th/"},
{id:23,name:"Cybersecurity Compliance",auth:"National Cyber Security Agency",phase:5,time:"30 days",cost:"0 THB",risk:"low",
 desc:"Critical Information Infrastructure security registration & compliance.",
 docs:["Security assessment report","Incident response plan","Access control documentation","Disaster recovery plan","ISO 27001 / SOC 2 certification"],
 form:"https://www.ncsa.go.th/"}
];

const phaseNames={1:"Development",2:"Design & Planning",3:"Construction",4:"Commissioning",5:"Operations"};
const riskLabel={crit:["CRITICAL","crit"],high:["HIGH RISK","high"],low:["LOW RISK","low"]};
let activePhase="all";

// populate dropdown
const sel=document.getElementById('permitSelect');
P.forEach(p=>{
  const o=document.createElement('option');
  o.value=p.id;
  o.textContent=`${p.id}. ${p.name}  —  ${p.auth.split('(')[0].trim()}`;
  sel.appendChild(o);
});

function showDetail(p){
  const d=document.getElementById('detail');
  const [rtxt,rcls]=riskLabel[p.risk];
  d.innerHTML=`
    <div class="d-head b${p.phase}">
      <div class="d-num">${p.id}</div>
      <h2>${p.name}<span class="pill ${rcls}">${rtxt}</span></h2>
    </div>
    <div class="d-body">
      <div class="meta-grid">
        <div class="meta"><div class="k">Authority</div><div class="v">${p.auth}</div></div>
        <div class="meta"><div class="k">Phase</div><div class="v">${phaseNames[p.phase]}</div></div>
        <div class="meta"><div class="k">Lead Time</div><div class="v">${p.time}</div></div>
        <div class="meta"><div class="k">Est. Cost</div><div class="v">${p.cost}</div></div>
      </div>
      <p style="color:#555;line-height:1.6">${p.desc}</p>
      <div class="sec-title">Documents Required</div>
      <ul class="docs">${p.docs.map(x=>`<li>${x}</li>`).join('')}</ul>
      <a class="formlink" href="${p.form}" target="_blank">🌐 Open Official Portal</a>
    </div>`;
  d.classList.add('show');
  d.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderGrid(list){
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML='<div class="empty">No permits match your search.</div>';return;}
  g.innerHTML=list.map(p=>`
    <div class="card" onclick="pick(${p.id})">
      <div class="ch b${p.phase}"><span>${p.name}</span><span class="cnum">${p.id}</span></div>
      <div class="cb">
        <div class="ca">${p.auth.split('(')[0].trim()}</div>
        <div class="cm"><span>⏱ ${p.time}</span><span>💰 ${p.cost.replace('~','').replace(' THB','')}</span></div>
      </div>
    </div>`).join('');
}

function pick(id){
  const p=P.find(x=>x.id==id);
  sel.value=id;
  showDetail(p);
}

function applyFilter(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=P;
  if(activePhase!=="all") list=list.filter(p=>p.phase==activePhase);
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q)||p.auth.toLowerCase().includes(q));
  document.getElementById('gridTitle').textContent=
    activePhase==="all"?`All Permits (${list.length})`:`${phaseNames[activePhase]} (${list.length})`;
  renderGrid(list);
}

sel.addEventListener('change',e=>{if(e.target.value)pick(e.target.value)});
document.getElementById('search').addEventListener('input',applyFilter);
document.querySelectorAll('.pbtn').forEach(b=>b.addEventListener('click',e=>{
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  activePhase=b.dataset.p;
  applyFilter();
}));

renderGrid(P);
</script>
</body>
</html>
